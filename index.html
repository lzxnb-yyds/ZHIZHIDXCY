<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>短信压力测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        .container { max-width: 480px; width: 100%; margin: auto; }
        .card { background-color: #1c1c1e; border-radius: 28px; padding: 24px 20px 32px; box-shadow: 0 8px 28px rgba(0,0,0,0.5); border: 0.5px solid #2c2c2e; }
        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }
        .search-icon { color: #8e8e93; font-size: 17px; font-weight: 400; }
        .official-channel { text-align: center; margin: 8px 0 20px 0; }
        .official-channel span { background: #2c2c2e; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; color: #0a84ff; display: inline-block; letter-spacing: 0.3px; }
        .warning-box { background-color: #2c2c2e; border-left: 4px solid #ff3b30; padding: 14px 16px; border-radius: 12px; margin-bottom: 28px; }
        .warning-box p { color: #ffffff; font-size: 14px; line-height: 1.4; margin: 4px 0; }
        .warning-box p:first-child { font-weight: 500; }
        .input-group { margin-bottom: 24px; }
        .input-group input { width: 100%; background-color: #2c2c2e; border: none; border-radius: 14px; padding: 16px 18px; font-size: 17px; color: #ffffff; text-align: center; letter-spacing: 0.5px; outline: none; transition: all 0.2s; }
        .input-group input:focus { background-color: #3a3a3c; box-shadow: 0 0 0 2px #0a84ff; }
        .input-group input::placeholder { color: #8e8e93; font-weight: 400; }
        .btn { background: #0a84ff; width: 100%; border: none; border-radius: 14px; padding: 16px 18px; font-size: 17px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; margin-bottom: 20px; }
        .btn:active { transform: scale(0.97); background: #0063ce; }
        .footer-note { text-align: center; font-size: 13px; color: #8e8e93; border-top: 0.5px solid #2c2c2e; padding-top: 20px; margin-top: 8px; }
        .result-area { background-color: #2c2c2e; border-radius: 20px; padding: 18px 16px; margin-top: 24px; }
        .result-stats { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .stat { flex: 1; text-align: center; background-color: #1c1c1e; border-radius: 16px; padding: 12px 6px; }
        .stat .number { font-size: 26px; font-weight: 700; color: #0a84ff; }
        .stat .label { font-size: 12px; color: #8e8e93; margin-top: 4px; }
        .error { background-color: #2c2c2e; color: #ff453a; text-align: center; padding: 14px; border-radius: 14px; margin-top: 20px; font-size: 14px; }
        .loading { display: none; text-align: center; margin: 24px 0; color: #8e8e93; }
        .loading.active { display: block; }
        .spinner { width: 36px; height: 36px; border: 3px solid #3a3a3c; border-top: 3px solid #0a84ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .high-pressure { text-align: center; margin-top: 16px; font-size: 12px; color: #8e8e93; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
        </div>
        <div class="official-channel"><span>作者WX:KLDLZ666888 QQ:1599785841</span></div>
        <div class="warning-box">
            <p>仅限测试自己号码</p>
            <p>请勿用于骚扰-恶意测试等违法行为-后果自负</p>
        </div>
        <form method="POST" id="smsForm">
            <div class="input-group">
                <input type="tel" name="phone" id="phone" placeholder="请输入11位手机号" autocomplete="off" required pattern="1[3-9]\d{9}" value="">
            </div>
            <button type="submit" class="btn" id="submitBtn">开始测试</button>
        </form>
        <div class="loading" id="loading"><div class="spinner"></div><div>高并发轰炸中，请稍候…</div></div>
                <div class="footer-note">安全测试</div>
    </div>
</div>
<script>
    const form = document.getElementById('smsForm');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', function(e) {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            e.preventDefault();
            alert('请输入有效的11位手机号码');
            return;
        }
        loading.classList.add('active');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ 测试中...';
    });
</script>
</body>
</html>
